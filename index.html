<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tattoo Demo - Professional Tattoo Designs">
    <meta name="keywords" content="tattoo, designs, art">
    <meta name="author" content="Ai-soulutions">
    <link rel="stylesheet" href="styles.css">
    <title>Tattoo Demo</title>
    <script src="script.js" defer></script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Tattoo Demo",
        "url": "http://www.example.com"
    }
    </script>
</head>
<body class="dark-theme">
    <header>
        <h1>Tattoo Demo</h1>
        <nav>
            <div class="hamburger-menu" onclick="toggleMenu()">
                &#9776;
            </div>
            <ul id="nav-links" class="hidden">
                <li><a href="#home" aria-label="Go to home section">Home</a></li>
                <li><a href="#about" aria-label="Go to about section">About</a></li>
                <li><a href="#portfolio" aria-label="Go to portfolio section">Portfolio</a></li>
                <li><a href="#contact" aria-label="Go to contact section">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="about">
            <h2>About Us</h2>
            <p>Welcome to our tattoo demo site where we showcase our professional tattoo designs.</p>
        </section>
        <section id="portfolio">
            <h2>Our Portfolio</h2>
            <img src="tattoo1.jpg" alt="Tattoo Design 1" loading="lazy">
            <img src="tattoo2.jpg" alt="Tattoo Design 2" loading="lazy">
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form onsubmit="return validateForm()">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required aria-required="true">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required aria-required="true">
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Ai-soulutions. All rights reserved.</p>
    </footer>
</body>
</html>
